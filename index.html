<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  background:#f5f5f5;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* APP */
#app{
  width:100%;
  max-width:420px;
  height:92vh;
  background:#fff;
  border-radius:20px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  box-shadow:0 10px 40px rgba(0,0,0,0.15);
}

/* HEADER CDA */
#header{
  background:#c8102e; /* rojo CDA */
  color:#fff;
  padding:15px;
  text-align:center;
  font-weight:bold;
  font-size:16px;
}

/* CHAT */
#chat{
  flex:1;
  overflow:auto;
  padding:15px;
  display:flex;
  flex-direction:column;
  gap:10px;
  background:#fafafa;
}

/* BURBUJAS */
.msg{
  max-width:75%;
  padding:10px 14px;
  border-radius:15px;
  line-height:1.4;
  font-size:14px;
  white-space:pre-line;
}

.user{
  align-self:flex-end;
  background:#ff8c00; /* naranja CDA */
  color:#fff;
}

.bot{
  align-self:flex-start;
  background:#e5e5e5;
  color:#333;
}

/* INPUT */
#inputBox{
  display:flex;
  padding:10px;
  background:#fff;
  border-top:1px solid #ddd;
}

input{
  flex:1;
  border:1px solid #ddd;
  border-radius:10px;
  padding:10px;
  background:#fff;
  color:#333;
}

button{
  margin-left:10px;
  border:none;
  border-radius:10px;
  padding:10px 15px;
  background:#c8102e;
  color:#fff;
  cursor:pointer;
}

/* SCROLL */
#chat::-webkit-scrollbar{
  width:4px;
}
#chat::-webkit-scrollbar-thumb{
  background:#ccc;
}
</style>

</head>

<body>

<div id="app">

  <div id="header">
    Asistente Clínicas del Azúcar
  </div>

  <div id="chat"></div>

  <div id="inputBox">
    <input id="msg" placeholder="Escribe 'jugar'...">
    <button onclick="send()">Enviar</button>
  </div>

</div>

<script>
const API = "https://cda-chat-production.up.railway.app/chat";
const userId = Math.random().toString(36).substring(7);
const chat = document.getElementById("chat");

function add(text, type){
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

document.getElementById("msg").addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    e.preventDefault();
    send();
  }
});

async function send(){
  const input = document.getElementById("msg");
  const text = input.value.trim();
  if(!text) return;

  add(text,"user");
  input.value="";

  const typing = document.createElement("div");
  typing.className = "msg bot";
  typing.innerText = "...";
  chat.appendChild(typing);
  chat.scrollTop = chat.scrollHeight;

  try{
    const res = await fetch(API,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({userId, mensaje:text})
    });

    const data = await res.json();
    typing.remove();
    add(data.respuesta || "Sin respuesta","bot");

  }catch(e){
    typing.remove();
    add("Error conectando con servidor","bot");
  }
}
</script>

</body>
</html>
