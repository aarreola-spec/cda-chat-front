<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
  margin:0;
  background:#0b0b10;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
#app{
  width:100%;
  max-width:420px;
  height:90vh;
  background:#111;
  border-radius:20px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  box-shadow:0 0 40px rgba(0,0,0,0.5);
}
#header{
  padding:15px;
  background:#1a1a25;
  font-weight:bold;
  text-align:center;
  border-bottom:1px solid #222;
}
#chat{
  flex:1;
  overflow:auto;
  padding:15px;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.msg{
  max-width:75%;
  padding:10px 14px;
  border-radius:15px;
  line-height:1.4;
  font-size:14px;
  white-space:pre-line;
}
.user{
  align-self:flex-end;
  background:#4fc3f7;
  color:#000;
}
.bot{
  align-self:flex-start;
  background:#2a2a35;
  color:#fff;
}
#inputBox{
  display:flex;
  padding:10px;
  background:#1a1a25;
}
input{
  flex:1;
  border:none;
  border-radius:10px;
  padding:10px;
  background:#222;
  color:#fff;
}
button{
  margin-left:10px;
  border:none;
  border-radius:10px;
  padding:10px 15px;
  background:#4fc3f7;
  color:#000;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="app">
  <div id="header">CDA Asistente</div>
  <div id="chat"></div>

  <div id="inputBox">
    <input id="msg" placeholder="Escribe 'jugar'...">
    <button onclick="send()">Enviar</button>
  </div>
</div>

<script>
const API = "https://cda-chat-production.up.railway.app/chat";
const userId = Math.random().toString(36).substring(7);
const chat = document.getElementById("chat");

function add(text, type){
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function send(){
  const input = document.getElementById("msg");
  const text = input.value.trim();
  if(!text) return;

  add(text,"user");
  input.value="";

  const typing = document.createElement("div");
  typing.className = "msg bot";
  typing.innerText = "...";
  chat.appendChild(typing);
  chat.scrollTop = chat.scrollHeight;

  try{
    const res = await fetch(API,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({userId, mensaje:text})
    });

    const data = await res.json();
    typing.remove();
    add(data.respuesta || "Sin respuesta","bot");

  }catch(e){
    typing.remove();
    add("Error conectando con servidor","bot");
  }
}
</script>

</body>
</html>
