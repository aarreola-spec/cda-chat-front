<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{margin:0;background:#111;color:#fff;font-family:Arial}
#app{max-width:500px;margin:auto;height:100vh;display:flex;flex-direction:column}
#header{background:#c8102e;padding:10px;text-align:center}
#chat{flex:1;overflow:auto;padding:10px}
.msg{margin:10px;padding:10px;border-radius:10px}
.user{background:#ff8c00;text-align:right}
.bot{background:#333}
#inputBox{display:flex}
input{flex:1;padding:10px}
button{padding:10px;background:#c8102e;color:#fff;border:none}
</style>

</head>

<body>

<div id="app">
<div id="header">CDA SHOW</div>
<div id="chat"></div>

<div id="inputBox">
<input id="msg">
<button onclick="send()">Enviar</button>
</div>
</div>

<script>
const API="https://cda-chat-production.up.railway.app/chat";
const VOZ="https://cda-chat-production.up.railway.app/voz";
const chat=document.getElementById("chat");

function add(t,c){
  const d=document.createElement("div");
  d.className="msg "+c;
  d.innerText=t;
  chat.appendChild(d);
}

async function hablar(texto){
  const r=await fetch(VOZ,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({texto})
  });
  const b=await r.blob();
  new Audio(URL.createObjectURL(b)).play();
}

async function send(){
  const input=document.getElementById("msg");
  const t=input.value;
  if(!t)return;

  add(t,"user");
  input.value="";

  const r=await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({mensaje:t})
  });

  const d=await r.json();

  add(d.respuesta,"bot");
  hablar(d.respuesta);
}
</script>

</body>
</html>
