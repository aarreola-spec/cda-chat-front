<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
  margin:0;
  background:#0a0a0f;
  color:#fff;
  font-family:sans-serif;
  display:flex;
  flex-direction:column;
  height:100vh;
}
#chat{
  flex:1;
  overflow:auto;
  padding:15px;
}
.msg{
  margin:10px 0;
}
.user{color:#4fc3f7}
.bot{color:#81c784}
#inputBox{
  display:flex;
  padding:10px;
  background:#111;
}
input{
  flex:1;
  padding:10px;
  border:none;
  outline:none;
  background:#222;
  color:#fff;
}
button{
  padding:10px;
  background:#4fc3f7;
  border:none;
  color:#000;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="chat"></div>

<div id="inputBox">
  <input id="msg" placeholder="Escribe... (ej: jugar)">
  <button onclick="send()">Enviar</button>
</div>

<script>
const API = "https://cda-chat-production.up.railway.app/chat";
const userId = Math.random().toString(36).substring(7);
const chat = document.getElementById("chat");

function add(text, type){
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = (type==="user"?"Tú: ":"Bot: ") + text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function send(){
  const input = document.getElementById("msg");
  const text = input.value.trim();
  if(!text) return;

  add(text,"user");
  input.value="";

  try{
    const res = await fetch(API,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({userId, mensaje:text})
    });

    const data = await res.json();
    add(data.respuesta || "Sin respuesta","bot");

  }catch(e){
    add("Error conectando con servidor","bot");
  }
}
</script>

</body>
</html>
